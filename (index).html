<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Plan Rural</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* PALETA RURAL */
        :root {
            --forest-green: #2d5a27;
            --wood-brown: #4b3621;
            --black-matte: #1a1a1a;
            --cream-paper: #fdfbf7;
            --accent-gold: #c5a059;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--cream-paper);
            color: var(--black-matte);
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: linear-gradient(rgba(253, 251, 247, 0.9), rgba(253, 251, 247, 0.9)), url('https://images.unsplash.com/photo-1449158743715-0a90ebb6d2d8?fm=jpg&q=60&w=3000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .auth-card {
            background: #f4f0e6;
            padding: 40px 50px;
            border-radius: 25px;
            border-top: 8px solid var(--forest-green);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        h1 {
            color: var(--wood-brown);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 15px;
            font-family: inherit;
            font-size: 1.1rem;
            border: 2px solid var(--wood-brown);
            border-radius: 15px;
            outline: none;
            box-sizing: border-box;
            background-color: white;
            transition: 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--forest-green);
            box-shadow: 0 0 8px rgba(45, 90, 39, 0.2);
        }

        .btn-auth {
            background: var(--forest-green);
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: none;
            border-radius: 15px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-auth:hover {
            background: var(--wood-brown);
            transform: scale(1.02);
        }

        .toggle-link {
            display: block;
            margin-top: 20px;
            color: var(--forest-green);
            font-weight: bold;
            cursor: pointer;
            text-decoration: underline;
        }

        .toggle-link:hover {
            color: var(--wood-brown);
        }

        .msg-box {
            font-weight: bold;
            margin-top: 15px;
            min-height: 20px;
        }

        /* Clase para ocultar formularios limpiamente */
        .oculto {
            display: none;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h1 id="titulo-form">🌲 Acceso 🌲</h1>
        
        <form id="form-login" onsubmit="iniciarSesion(event)">
            <div class="input-group">
                <input type="text" id="login-user" placeholder="Usuario" required>
            </div>
            <div class="input-group">
                <input type="password" id="login-pass" placeholder="Contraseña" required>
            </div>
            <button type="submit" class="btn-auth">Entrar al Plan</button>
            <span class="toggle-link" onclick="cambiarVista('registro')">¿No tienes cuenta? Regístrate</span>
        </form>

        <form id="form-registro" class="oculto" onsubmit="registrarUsuario(event)">
            <div class="input-group">
                <input type="text" id="reg-user" placeholder="Elige un usuario" required>
            </div>
            <div class="input-group">
                <input type="password" id="reg-pass" placeholder="Contraseña" required>
            </div>
            <div class="input-group">
                <input type="password" id="reg-pass-confirm" placeholder="Repite la contraseña" required>
            </div>
            <button type="submit" class="btn-auth">Crear Cuenta</button>
            <span class="toggle-link" onclick="cambiarVista('login')">¿Ya tienes cuenta? Inicia sesión</span>
        </form>

        <p id="mensaje-feedback" class="msg-box"></p>
    </div>

    <script>
        // 1. Inicializar la "Base de Datos" en localStorage si no existe
        function inicializarDB() {
            if (!localStorage.getItem('usuariosDB')) {
                // Creamos un usuario de prueba por defecto
                const dbInicial = [{ usuario: "admin", contrasena: "admin" }];
                localStorage.setItem('usuariosDB', JSON.stringify(dbInicial));
            }
        }

        // Ejecutamos al cargar
        document.addEventListener("DOMContentLoaded", () => {
            inicializarDB();
            
            // Redirigir si ya hay sesión iniciada
            if (localStorage.getItem('usuarioLogueado')) {
                window.location.href = 'index.html';
            }
        });

        // 2. Controlar qué formulario se ve
        function cambiarVista(vista) {
            const formLogin = document.getElementById('form-login');
            const formRegistro = document.getElementById('form-registro');
            const titulo = document.getElementById('titulo-form');
            const mensaje = document.getElementById('mensaje-feedback');

            mensaje.textContent = ""; // Limpiamos mensajes de error

            if (vista === 'registro') {
                formLogin.classList.add('oculto');
                formRegistro.classList.remove('oculto');
                titulo.textContent = "🌲 Registro 🌲";
            } else {
                formRegistro.classList.add('oculto');
                formLogin.classList.remove('oculto');
                titulo.textContent = "🌲 Acceso 🌲";
            }
        }

        // 3. Lógica de Registro
        function registrarUsuario(event) {
            event.preventDefault();
            const user = document.getElementById('reg-user').value.trim().toLowerCase();
            const pass = document.getElementById('reg-pass').value.trim();
            const passConfirm = document.getElementById('reg-pass-confirm').value.trim();
            const mensaje = document.getElementById('mensaje-feedback');

            // Validar contraseñas
            if (pass !== passConfirm) {
                mostrarMensaje("Las contraseñas no coinciden.", "red");
                return;
            }

            // Recuperar base de datos
            let db = JSON.parse(localStorage.getItem('usuariosDB'));

            // Comprobar si el usuario ya existe
            const existe = db.find(u => u.usuario === user);
            if (existe) {
                mostrarMensaje("Ese usuario ya está pillado.", "red");
                return;
            }

            // Añadir usuario y guardar
            db.push({ usuario: user, contrasena: pass });
            localStorage.setItem('usuariosDB', JSON.stringify(db));

            // Auto-login tras el registro
            iniciarSesionDirecta(user);
        }

        // 4. Lógica de Login
        function iniciarSesion(event) {
            event.preventDefault();
            const user = document.getElementById('login-user').value.trim().toLowerCase();
            const pass = document.getElementById('login-pass').value.trim();
            
            let db = JSON.parse(localStorage.getItem('usuariosDB'));
            
            const usuarioValido = db.find(u => u.usuario === user && u.contrasena === pass);

            if (usuarioValido) {
                iniciarSesionDirecta(usuarioValido.usuario);
            } else {
                mostrarMensaje("Usuario o contraseña incorrectos.", "red");
            }
        }

        // 5. Utilidades
        function iniciarSesionDirecta(nombreUsuario) {
            localStorage.setItem('usuarioLogueado', JSON.stringify({
                nombre: nombreUsuario,
                timestamp: new Date().getTime()
            }));

            mostrarMensaje("¡Todo listo! Entrando...", "var(--forest-green)");
            
            setTimeout(() => {
                window.location.href = 'index.html'; 
            }, 800);
        }

        function mostrarMensaje(texto, color) {
            const cajaMensaje = document.getElementById('mensaje-feedback');
            cajaMensaje.style.color = color;
            cajaMensaje.textContent = texto;
        }
    </script>

</body>
</html>
