<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Rural Amigos - Pantalla Completa</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* PALETA RURAL */
        :root {
            --forest-green: #2d5a27;
            --wood-brown: #4b3621;
            --black-matte: #1a1a1a;
            --cream-paper: #fdfbf7;
            --accent-gold: #c5a059;
        }

        body {
            font-family: 'Nunito', 'Arial Rounded MT Bold', sans-serif;
            background-color: var(--cream-paper);
            color: var(--black-matte);
            margin: 0;
            padding: 0;
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* CONTENEDOR FLUIDO: Ocupa todo el espacio */
        .feed-container {
            width: 100%;
            min-height: 100vh;
            padding: 3vw 5vw;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            color: var(--forest-green);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
            font-size: 2.5rem;
            border-bottom: 3px solid var(--wood-brown);
            padding-bottom: 15px;
            margin-top: 0;
        }

        /* SECCIÓN SUPERIOR: Se adapta a pantalla completa */
        .top-section {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            margin-top: 20px;
            flex-grow: 1;
        }

        /* FOTO ELEGIR CASA */
        .house-selector {
            position: relative;
            min-height: 400px;
            border-radius: 25px;
            overflow: hidden;
            border: 5px solid var(--wood-brown);
            background-image: url('https://images.unsplash.com/photo-1449158743715-0a90ebb6d2d8?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8Y2FiYSVDMyVCMWElMjBlbiUyMGVsJTIwYm9zcXVlfGVufDB8fDB8fHww');
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .house-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.6) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .house-overlay h2 {
            color: white;
            font-size: 2.5rem;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            margin-bottom: 25px;
        }

        .btn-choose {
            background: var(--forest-green);
            color: white;
            padding: 15px 40px;
            font-size: 1.2rem;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 900;
            transition: 0.3s;
            border: 2px solid var(--cream-paper);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn-choose:hover {
            background: var(--wood-brown);
            transform: scale(1.05);
        }

        /* LISTA AMIGOS */
        .members-card {
            background: #f4f0e6;
            padding: 30px;
            border-radius: 25px;
            border-left: 8px solid var(--wood-brown);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .members-card h3 {
            font-size: 1.8rem;
            margin-top: 0;
            color: var(--wood-brown);
        }

        .member-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            font-family: inherit;
            font-size: 1.1rem;
            border: 2px solid var(--wood-brown);
            border-radius: 15px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--forest-green);
        }

        .btn-add {
            background: var(--black-matte);
            color: white;
            border: none;
            padding: 0 20px;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 15px;
            transition: 0.2s;
        }

        .btn-add:hover { background: var(--forest-green); }

        #list-members {
            list-style: none;
            padding: 0;
            margin: 0;
            flex-grow: 1;
            overflow-y: auto;
        }

        #list-members li {
            padding: 15px;
            font-size: 1.2rem;
            background: white;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* BOTONES NAVEGACIÓN */
        .nav-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 25px;
            margin-top: 40px;
        }

        .btn-nav {
            background: var(--forest-green);
            color: white;
            padding: 25px;
            font-size: 1.3rem;
            text-align: center;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 900;
            box-shadow: 0 6px 0 var(--wood-brown);
            transition: all 0.2s;
        }

        .btn-nav:active {
            transform: translateY(6px);
            box-shadow: none;
        }

        .btn-nav.alt { background: var(--wood-brown); box-shadow: 0 6px 0 #2a1f12; }
        .btn-nav.dark { background: var(--black-matte); box-shadow: 0 6px 0 #000; }

        /* PRESUPUESTO FINAL */
        .footer-budget {
            margin-top: 40px;
            background: var(--black-matte);
            color: var(--cream-paper);
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .budget-grid {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 15px;
        }

        .budget-grid > div { flex: 1; }

        .price-big {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--accent-gold);
            display: block;
            margin-top: 10px;
        }

        /* Responsive para móviles */
        @media (max-width: 800px) {
            .top-section { grid-template-columns: 1fr; }
            .nav-buttons { grid-template-columns: 1fr; }
            .budget-grid { flex-direction: column; gap: 20px; }
            .budget-grid > div:nth-child(2) { border-left: none; border-top: 1px solid #444; padding-top: 20px; }
        }
    </style>
</head>
<body>

<div class="feed-container">
    <h1>🌲 Plan Rural Amigos 🌲</h1>

    <div class="top-section">
        <div class="house-selector">
            <div class="house-overlay">
                <h2>¿A dónde vamos?</h2>
                <a href="votaciones.html" class="btn-choose">Elegir Casa</a>
            </div>
        </div>

        <div class="members-card">
            <h3>👥 Asistentes</h3>
            <div class="member-input-group">
                <input type="text" id="nameInput" placeholder="Añade un amigo..." onkeypress="handleKeyPress(event)">
                <button class="btn-add" onclick="addMember()">+</button>
            </div>
            <ul id="list-members"></ul>
        </div>
    </div>

    <div class="nav-buttons">
        <a href="transporte.html" class="btn-nav">🚗 Transporte</a>
        <a href="compra.html" class="btn-nav alt">🛒 Compra</a>
        <a href="actividades.html" class="btn-nav dark">🏹 Actividades</a>
    </div>

    <div class="footer-budget">
        <h3 style="margin:0; font-size: 1.5rem; letter-spacing: 2px;">💰 RESUMEN DE GASTOS</h3>
        <div class="budget-grid">
            <div>
                <span style="font-size: 1.2rem; opacity: 0.8;">TOTAL VIAJE</span>
                <span class="price-big" id="total-price">0€</span>
            </div>
            <div style="border-left: 2px solid #333;">
                <span style="font-size: 1.2rem; opacity: 0.8;">POR PERSONA</span>
                <span class="price-big" id="per-person" style="color: white;">0€</span>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Array principal donde guardaremos los datos
    let miembros = [];

    // 2. Al cargar la página, recuperamos los datos guardados
    document.addEventListener("DOMContentLoaded", () => {
        cargarMiembros();
    });

    // 3. Función para cargar desde localStorage
    function cargarMiembros() {
        const guardado = localStorage.getItem('miembrosViajeRural');
        if (guardado) {
            // Convertimos de JSON a Array de nuevo
            miembros = JSON.parse(guardado);
        }
        renderizarLista();
    }

    // 4. Función para guardar en localStorage
    function guardarMiembros() {
        // Convertimos el Array a texto JSON
        localStorage.setItem('miembrosViajeRural', JSON.stringify(miembros));
    }

    // 5. Función que "dibuja" la lista en el HTML
    function renderizarLista() {
        const list = document.getElementById('list-members');
        list.innerHTML = ''; // Limpiamos la lista actual
        
        miembros.forEach((nombre, index) => {
            const li = document.createElement('li');
            li.innerHTML = `
                <span>${nombre}</span> 
                <span style="cursor:pointer; color:#e74c3c; font-weight:bold;" onclick="eliminarMiembro(${index})">×</span>
            `;
            list.appendChild(li);
        });
    }

    // 6. Añadir un miembro nuevo
    function addMember() {
        const input = document.getElementById('nameInput');
        const nombre = input.value.trim();
        
        if (nombre !== "") {
            miembros.push(nombre); // Lo añadimos al Array
            guardarMiembros();     // Lo guardamos en JSON
            renderizarLista();     // Actualizamos la pantalla
            input.value = "";      // Vaciamos el cuadro de texto
        }
    }

    // 7. Eliminar un miembro por su posición (index)
    function eliminarMiembro(index) {
        miembros.splice(index, 1); // Lo quitamos del Array
        guardarMiembros();         // Actualizamos el JSON guardado
        renderizarLista();         // Actualizamos la pantalla
    }

    // Extra: Permitir añadir pulsando la tecla "Enter"
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            addMember();
        }
    }
</script>

</body>
</html>
